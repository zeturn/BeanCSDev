name: GHCR + k3s CI/CD

on:
  push:
    branches: [main, deploy]
    tags:
      - "v*"
      - "beancs-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: beancs-controller
  NAMESPACE: beancs-system

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: beancs-controller/go.mod
          cache-dependency-path: beancs-controller/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: beancs-controller/internal/web/package-lock.json

      - name: Build web UI
        working-directory: beancs-controller/internal/web
        run: |
          npm ci
          npm run build

      - name: Test controller
        working-directory: beancs-controller
        run: go test -v -timeout=5m ./...

      - name: Test CLI
        working-directory: beanctl
        run: go test -v -timeout=5m ./...

  build_and_push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/${IMAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${GITHUB_SHA}"
            echo "${IMAGE}:latest"
            if [[ "${GITHUB_REF}" == refs/tags/v* || "${GITHUB_REF}" == refs/tags/beancs-v* ]]; then
              echo "${IMAGE}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller
        uses: docker/build-push-action@v6
        with:
          context: ./beancs-controller
          file: ./beancs-controller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}

  deploy_k3s:
    needs: build_and_push
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/beancs-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag belongs to deploy branch
        shell: bash
        run: |
          git fetch origin deploy --depth=1
          TAG_SHA="$(git rev-list -n 1 "${GITHUB_REF}")"
          if ! git merge-base --is-ancestor "${TAG_SHA}" "origin/deploy"; then
            echo "Tag commit is not contained in origin/deploy."
            exit 1
          fi

      - name: Configure kubeconfig
        shell: bash
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG secret is required"
            exit 1
          fi
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${NAMESPACE}"

      - name: Ensure cert-manager
        shell: bash
        run: |
          set -euxo pipefail
          if ! kubectl get crd certificates.cert-manager.io >/dev/null 2>&1; then
            kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.20.0/cert-manager.yaml
          fi
          kubectl wait --for=condition=Established crd/certificates.cert-manager.io --timeout=120s
          kubectl wait --for=condition=Established crd/clusterissuers.cert-manager.io --timeout=120s
          kubectl -n cert-manager rollout status deployment/cert-manager --timeout=180s
          if ! kubectl -n cert-manager rollout status deployment/cert-manager-cainjector --timeout=420s; then
            kubectl -n cert-manager get pods -o wide
            kubectl -n cert-manager describe deployment/cert-manager-cainjector || true
            echo "::warning::cert-manager-cainjector did not become ready; continuing because controller rollout can proceed with existing cert-manager CRDs."
          fi
          kubectl -n cert-manager rollout status deployment/cert-manager-webhook --timeout=420s
          kubectl apply -f beancs-controller/deploy/clusterissuer-letsencrypt.yaml

      - name: Configure GHCR pull secret
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          kubectl -n "${NAMESPACE}" create secret docker-registry ghcr-creds \
            --docker-server=ghcr.io \
            --docker-username="${OWNER_LC}" \
            --docker-password="${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy bundled Postgres
        shell: bash
        env:
          POSTGRES_PASSWORD: ${{ secrets.BEANCS_POSTGRES_PASSWORD }}
        run: |
          if [ -z "${POSTGRES_PASSWORD}" ]; then
            echo "BEANCS_POSTGRES_PASSWORD secret is required"
            exit 1
          fi
          kubectl -n "${NAMESPACE}" create secret generic beancs-postgres \
            --from-literal=POSTGRES_DB=beancs \
            --from-literal=POSTGRES_USER=beancs \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f beancs-controller/deploy/postgres.yaml
          kubectl -n "${NAMESPACE}" get service beancs-postgres
          kubectl -n "${NAMESPACE}" rollout status statefulset/beancs-postgres --timeout=180s
          kubectl -n "${NAMESPACE}" get pods -l app=beancs-postgres -o wide
          kubectl -n "${NAMESPACE}" get service,endpoints beancs-postgres -o wide

      - name: Configure controller env
        shell: bash
        env:
          BEANCS_DATABASE_URL: ${{ secrets.BEANCS_DATABASE_URL }}
          BEANCS_POSTGRES_PASSWORD: ${{ secrets.BEANCS_POSTGRES_PASSWORD }}
        run: |
          DATABASE_URL="${BEANCS_DATABASE_URL}"
          if [ -z "${DATABASE_URL}" ]; then
            ENCODED_POSTGRES_PASSWORD="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["BEANCS_POSTGRES_PASSWORD"], safe=""))')"
            POSTGRES_HOST="beancs-postgres.${NAMESPACE}.svc.cluster.local"
            DATABASE_URL="postgres://beancs:${ENCODED_POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/beancs?sslmode=disable"
          fi
          kubectl -n "${NAMESPACE}" create secret generic beancs-controller-env \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=BP_MGMT_BASE_URL="${{ secrets.BP_MGMT_BASE_URL }}" \
            --from-literal=BP_MGMT_CLIENT_ID="${{ secrets.BP_MGMT_CLIENT_ID }}" \
            --from-literal=BP_MGMT_CLIENT_SECRET="${{ secrets.BP_MGMT_CLIENT_SECRET }}" \
            --from-literal=BP_BROWSER_AUTH_URL="${{ secrets.BP_BROWSER_AUTH_URL }}" \
            --from-literal=BP_BROWSER_CLIENT_ID="${{ secrets.BP_BROWSER_CLIENT_ID }}" \
            --from-literal=BP_BROWSER_CLIENT_SECRET="${{ secrets.BP_BROWSER_CLIENT_SECRET }}" \
            --from-literal=WEBHOOK_SECRET="${{ secrets.BEANCS_WEBHOOK_SECRET }}" \
            --from-literal=ENCRYPTION_KEY="${{ secrets.BEANCS_ENCRYPTION_KEY }}" \
            --from-literal=INGRESS_IP="${{ vars.INGRESS_IP }}" \
            --from-literal=BEANCS_PUBLIC_INGRESS_NAMESPACES="${{ vars.BEANCS_PUBLIC_INGRESS_NAMESPACES || 'kube-system,traefik' }}" \
            --from-literal=BEANCS_PRIVATE_INGRESS_NAMESPACES="${{ vars.BEANCS_PRIVATE_INGRESS_NAMESPACES || 'tailscale,tailscale-system' }}" \
            --from-literal=BEANCS_CERT_MANAGER_ISSUER_NAME="${{ vars.BEANCS_CERT_MANAGER_ISSUER_NAME || 'beancs-letsencrypt' }}" \
            --from-literal=BEANCS_CERT_MANAGER_ACME_SERVER="${{ vars.BEANCS_CERT_MANAGER_ACME_SERVER || 'https://acme-v02.api.letsencrypt.org/directory' }}" \
            --from-literal=BEANCS_CERT_MANAGER_EMAIL="${{ vars.BEANCS_CERT_MANAGER_EMAIL }}" \
            --from-literal=BEANCS_CERT_MANAGER_CLOUDFLARE_SECRET_NAME="${{ vars.BEANCS_CERT_MANAGER_CLOUDFLARE_SECRET_NAME || 'beancs-cloudflare-dns01' }}" \
            --from-literal=BEANCS_CERT_MANAGER_CLOUDFLARE_SECRET_KEY="${{ vars.BEANCS_CERT_MANAGER_CLOUDFLARE_SECRET_KEY || 'api-token' }}" \
            --from-literal=BEANCS_CERT_MANAGER_PRIVATE_KEY_SECRET_SUFFIX="${{ vars.BEANCS_CERT_MANAGER_PRIVATE_KEY_SECRET_SUFFIX || 'account-key' }}" \
            --from-literal=BEANCS_PUBLIC_HOST="${{ vars.BEANCS_PUBLIC_HOST }}" \
            --from-literal=BEANCS_WEBHOOK_HOST="${{ vars.BEANCS_WEBHOOK_HOST }}" \
            --from-literal=BEANCS_TAILSCALE_HOST="${{ vars.BEANCS_TAILSCALE_HOST || 'beancs-controller' }}" \
            --from-literal=BEANCS_GITHUB_APP_ID="${{ vars.BEANCS_GITHUB_APP_ID }}" \
            --from-literal=BEANCS_GITHUB_APP_SLUG="${{ vars.BEANCS_GITHUB_APP_SLUG }}" \
            --from-literal=BEANCS_GITHUB_APP_PRIVATE_KEY="${{ secrets.BEANCS_GITHUB_APP_PRIVATE_KEY }}" \
            --from-literal=BEANCS_REGISTRY_HOST="${{ secrets.BEANCS_REGISTRY_HOST }}" \
            --from-literal=BEANCS_REGISTRY_USERNAME="${{ secrets.BEANCS_REGISTRY_USERNAME }}" \
            --from-literal=BEANCS_REGISTRY_TOKEN="${{ secrets.BEANCS_REGISTRY_TOKEN }}" \
            --from-literal=BEANCS_REGISTRY_PULL_USERNAME="${{ secrets.BEANCS_REGISTRY_PULL_USERNAME }}" \
            --from-literal=BEANCS_REGISTRY_PULL_TOKEN="${{ secrets.BEANCS_REGISTRY_PULL_TOKEN }}" \
            --from-literal=BEANCS_REGISTRY_PULL_SECRET="${{ vars.BEANCS_REGISTRY_PULL_SECRET || 'beancs-registry-pull' }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy controller manifests
        shell: bash
        run: |
          kubectl apply -f beancs-controller/deploy/deployment.yaml
          kubectl apply -f beancs-controller/deploy/networkpolicy.yaml

          IMAGE="${{ needs.build_and_push.outputs.image }}:${GITHUB_SHA}"
          kubectl -n "${NAMESPACE}" set image deployment/beancs-controller controller="${IMAGE}"
          kubectl -n "${NAMESPACE}" patch deployment beancs-controller \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-creds"}]}}}}'
          if ! kubectl -n "${NAMESPACE}" rollout status deployment/beancs-controller --timeout=240s; then
            kubectl -n "${NAMESPACE}" describe deployment beancs-controller
            kubectl -n "${NAMESPACE}" get replicasets,pods -l app=beancs-controller -o wide
            kubectl -n "${NAMESPACE}" describe replicasets -l app=beancs-controller
            kubectl -n "${NAMESPACE}" describe pods -l app=beancs-controller
            for pod in $(kubectl -n "${NAMESPACE}" get pods -l app=beancs-controller -o name); do
              echo "::group::Logs for ${pod}"
              kubectl -n "${NAMESPACE}" logs "${pod}" --all-containers=true --tail=200 || true
              echo "::endgroup::"
              echo "::group::Previous logs for ${pod}"
              kubectl -n "${NAMESPACE}" logs "${pod}" --all-containers=true --previous --tail=200 || true
              echo "::endgroup::"
            done
            exit 1
          fi
