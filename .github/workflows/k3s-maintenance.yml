name: k3s maintenance

on:
  workflow_dispatch:
    inputs:
      cleanup_public_demo:
        description: "Delete demo ingress resources that can conflict with production hostnames"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      install_cert_manager:
        description: "Install cert-manager and the letsencrypt-prod ClusterIssuer"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      restart_traefik:
        description: "Restart Traefik to reload current routes and endpoints"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure kubeconfig
        shell: bash
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG secret is required"
            exit 1
          fi
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Clean conflicting demo ingresses
        if: ${{ github.event.inputs.cleanup_public_demo == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          kubectl -n public-demo delete ingress whoami-public whoami-public-http-redirect --ignore-not-found

      - name: Ensure cert-manager
        if: ${{ github.event.inputs.install_cert_manager == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          if ! kubectl get crd certificates.cert-manager.io >/dev/null 2>&1; then
            kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.20.0/cert-manager.yaml
          fi
          kubectl wait --for=condition=Established crd/certificates.cert-manager.io --timeout=120s
          kubectl wait --for=condition=Established crd/clusterissuers.cert-manager.io --timeout=120s
          kubectl -n cert-manager rollout status deployment/cert-manager --timeout=180s
          kubectl -n cert-manager rollout status deployment/cert-manager-cainjector --timeout=180s
          kubectl -n cert-manager rollout status deployment/cert-manager-webhook --timeout=180s
          kubectl apply -f beancs-controller/deploy/clusterissuer-letsencrypt.yaml

      - name: Restart Traefik
        if: ${{ github.event.inputs.restart_traefik == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          kubectl -n traefik rollout restart deployment/traefik
          kubectl -n traefik rollout status deployment/traefik --timeout=180s

      - name: Show production routing
        shell: bash
        run: |
          set -euxo pipefail
          kubectl get clusterissuer,certificate,challenge,order -A || true
          kubectl get ingress -A -o wide || true
          kubectl -n beancs-system get pods,svc,endpoints,ingress -o wide
