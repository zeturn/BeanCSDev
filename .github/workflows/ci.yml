name: CI

on:
  pull_request:
    branches: [master, main, deploy]
  push:
    branches: [master, main, deploy]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go checks (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - beancs-controller
          - beanctl
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Set up Node
        if: matrix.module == 'beancs-controller'
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: beancs-controller/internal/web/package-lock.json

      - name: Build embedded web assets
        if: matrix.module == 'beancs-controller'
        working-directory: beancs-controller/internal/web
        run: |
          npm audit fix --omit=dev --package-lock-only || true
          npm ci
          npm run build

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -v -race -timeout=5m ./...

      - name: Advisory vulnerability scan
        continue-on-error: true
        working-directory: ${{ matrix.module }}
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  web:
    name: Web UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beancs-controller/internal/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: beancs-controller/internal/web/package-lock.json

      - name: Refresh audited dependency lock
        run: npm audit fix --omit=dev --package-lock-only || true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build controller image
        uses: docker/build-push-action@v6
        with:
          context: ./beancs-controller
          file: ./beancs-controller/Dockerfile
          push: false
          tags: beancs-controller:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
