apiVersion: beancs.io/v1
kind: DependencyDefinition
metadata:
  name: rabbitmq
  displayName: RabbitMQ
  category: message-queue
spec:
  type: rabbitmq
  supportedDeployMethods: [helm, external]
  defaultDeployMethod: helm
  helm:
    chart:
      repo: https://charts.bitnami.com/bitnami
      name: rabbitmq
      version: "16.0.14"
    valuesTemplate: rabbitmq.values.yaml
  configSchema:
    type: object
    properties:
      username:
        type: string
        default: user
      host:
        type: string
      port:
        type: string
        default: "5672"
      password:
        type: string
        secret: true
        generate:
          length: 32
      admin_username:
        type: string
      admin_password:
        type: string
        secret: true
      management_port:
        type: string
        default: "15672"
      persistence:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
          size:
            type: string
            default: 8Gi
          storageClass:
            type: string
      managementUI:
        type: object
        properties:
          enabled:
            type: boolean
            default: false
  services:
    - name: amqp
      port: 5672
      protocol: tcp
      default: true
    - name: management
      port: 15672
      protocol: http
      optional: true
  outputs:
    host:
      valueFrom:
        serviceHost: amqp
    port:
      valueFrom:
        config: port
    username:
      valueFrom:
        secretKey: username
    password:
      valueFrom:
        secretKey: password
    url:
      secretTemplate: "amqp://{{username}}:{{password}}@{{host}}:{{port}}/"
  envPresets:
    rabbitmq_default:
      env:
        RABBITMQ_HOST:
          output: host
        RABBITMQ_PORT:
          output: port
        RABBITMQ_USERNAME:
          output: username
          secret: true
        RABBITMQ_PASSWORD:
          output: password
          secret: true
        RABBITMQ_URL:
          output: url
          secret: true
  persistence:
    defaultEnabled: true
    mountPath: /var/lib/rabbitmq
