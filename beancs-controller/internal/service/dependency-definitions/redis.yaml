apiVersion: beancs.io/v1
kind: DependencyDefinition
metadata:
  name: redis
  displayName: Redis
  category: cache
spec:
  type: redis
  supportedDeployMethods: [helm, external]
  defaultDeployMethod: helm
  helm:
    chart:
      repo: https://charts.bitnami.com/bitnami
      name: redis
      version: "25.5.3"
    valuesTemplate: redis.values.yaml
  configSchema:
    type: object
    properties:
      architecture:
        type: string
        enum: [standalone, replication]
        default: standalone
      host:
        type: string
      port:
        type: string
        default: "6379"
      password:
        type: string
        secret: true
        generate:
          length: 32
      persistence:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
          size:
            type: string
            default: 8Gi
  services:
    - name: redis
      port: 6379
      protocol: tcp
      default: true
  outputs:
    host:
      valueFrom:
        serviceHost: redis
    port:
      valueFrom:
        config: port
    password:
      valueFrom:
        secretKey: password
    url:
      secretTemplate: "redis://:{{password}}@{{host}}:{{port}}/0"
  envPresets:
    redis_default:
      env:
        REDIS_HOST:
          output: host
        REDIS_PORT:
          output: port
        REDIS_PASSWORD:
          output: password
          secret: true
        REDIS_URL:
          output: url
          secret: true
