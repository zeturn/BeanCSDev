apiVersion: beancs.io/v1
kind: DependencyDefinition
metadata:
  name: mysql
  displayName: MySQL
  category: database
spec:
  type: mysql
  supportedDeployMethods: [helm, external]
  defaultDeployMethod: helm
  helm:
    chart:
      repo: https://charts.bitnami.com/bitnami
      name: mysql
      version: "*"
    valuesTemplate: mysql.values.yaml
  configSchema:
    type: object
    properties:
      database:
        type: string
        default: app
      host:
        type: string
      port:
        type: string
        default: "3306"
      username:
        type: string
        default: app
      password:
        type: string
        secret: true
        generate:
          length: 32
      persistence:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
          size:
            type: string
            default: 20Gi
  services:
    - name: mysql
      port: 3306
      protocol: tcp
      default: true
  outputs:
    host:
      valueFrom:
        serviceHost: mysql
    port:
      valueFrom:
        config: port
    database:
      valueFrom:
        config: database
    username:
      valueFrom:
        secretKey: username
    password:
      valueFrom:
        secretKey: password
    url:
      secretTemplate: "{{username}}:{{password}}@tcp({{host}}:{{port}})/{{database}}?charset=utf8mb4&parseTime=True&loc=Local"
  envPresets:
    mysql_default:
      env:
        MYSQL_HOST:
          output: host
        MYSQL_PORT:
          output: port
        MYSQL_DATABASE:
          output: database
        MYSQL_USERNAME:
          output: username
          secret: true
        MYSQL_PASSWORD:
          output: password
          secret: true
        DATABASE_URL:
          output: url
          secret: true
