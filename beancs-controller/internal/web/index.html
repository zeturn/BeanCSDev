<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeanCS</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --ink: #18202f;
        --muted: #667085;
        --line: #d7dce5;
        --accent: #0b6bcb;
        --accent-strong: #084f9a;
        --ok-bg: #e8f7ee;
        --ok: #17613a;
        --warn-bg: #fff4d6;
        --warn: #7a5300;
        --bad-bg: #fdebea;
        --bad: #9f1d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 244px minmax(0, 1fr);
      }

      .sidebar {
        background: #101828;
        color: #f9fafb;
        padding: 24px 18px;
      }

      .brand {
        font-size: 22px;
        font-weight: 760;
        letter-spacing: 0;
        margin-bottom: 28px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        padding: 9px 10px;
        background: #1d2939;
        color: #ffffff;
        text-align: left;
        cursor: pointer;
      }

      .nav-item + .nav-item {
        margin-top: 8px;
      }

      .nav-item.active {
        background: #ffffff;
        color: #101828;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #52c41a;
      }

      .main {
        min-width: 0;
        padding: 22px 28px 36px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 24px;
        line-height: 1.2;
        margin: 0;
        letter-spacing: 0;
      }

      .subtle {
        color: var(--muted);
        margin: 4px 0 0;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 14px;
        background: #ffffff;
        color: var(--ink);
        cursor: pointer;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .button.primary:hover {
        background: var(--accent-strong);
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(6, minmax(118px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 10px 12px;
      }

      .stat-value {
        display: block;
        font-size: 22px;
        font-weight: 760;
        line-height: 1.1;
      }

      .stat-label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
      }

      .search {
        width: min(420px, 100%);
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 12px;
        background: #ffffff;
        color: var(--ink);
      }

      .credential-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
        margin-bottom: 14px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(150px, 1fr));
        gap: 10px;
      }

      .form-grid input {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        background: #ffffff;
        color: var(--ink);
      }

      .form-grid .wide {
        grid-column: span 2;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 10px;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .name {
        font-weight: 700;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 9px;
        background: var(--ok-bg);
        color: var(--ok);
        font-size: 12px;
        font-weight: 700;
      }

      .pill.warn {
        background: var(--warn-bg);
        color: var(--warn);
      }

      .labels {
        max-width: 420px;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--muted);
      }

      .empty {
        color: var(--muted);
        text-align: center;
      }

      .notice {
        display: none;
        margin-bottom: 14px;
        border-radius: 8px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        background: #ffffff;
      }

      .notice.show {
        display: block;
      }

      .notice.error {
        border-color: #f4b4b4;
        background: var(--bad-bg);
        color: var(--bad);
      }

      .login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-panel {
        width: min(440px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 26px;
      }

      .login-panel h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }

      .login-panel .button {
        width: 100%;
        margin-top: 22px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 760px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          padding: 14px 18px;
        }

        .brand {
          margin-bottom: 10px;
        }

        .main {
          padding: 18px;
        }

        .topbar,
        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .form-grid .wide {
          grid-column: auto;
        }

        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <section id="login" class="login hidden">
      <div class="login-panel">
        <h1>BeanCS</h1>
        <p class="subtle">Sign in with BasaltPass to manage your k3s runtime.</p>
        <button id="loginButton" class="button primary">Sign in with BasaltPass</button>
      </div>
    </section>

    <section id="app" class="shell hidden">
      <aside class="sidebar">
        <div class="brand">BeanCS</div>
        <button class="nav-item active" type="button" data-resource="namespaces"><span class="dot"></span><span>Namespaces</span></button>
        <button class="nav-item" type="button" data-resource="pods"><span class="dot"></span><span>Pods</span></button>
        <button class="nav-item" type="button" data-resource="nodes"><span class="dot"></span><span>Nodes</span></button>
        <button class="nav-item" type="button" data-resource="deployments"><span class="dot"></span><span>Deployments</span></button>
        <button class="nav-item" type="button" data-resource="services"><span class="dot"></span><span>Services</span></button>
        <button class="nav-item" type="button" data-resource="ingresses"><span class="dot"></span><span>Ingresses</span></button>
        <button class="nav-item" type="button" data-resource="github_credentials"><span class="dot"></span><span>GitHub Keys</span></button>
        <button class="nav-item" type="button" data-resource="cloudflare_credentials"><span class="dot"></span><span>Cloudflare Keys</span></button>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h1 id="viewTitle">Namespaces</h1>
            <p id="summary" class="subtle">Loading cluster state</p>
          </div>
          <div class="actions">
            <button id="refreshButton" class="button" type="button">Refresh</button>
            <button id="logoutButton" class="button" type="button">Sign out</button>
          </div>
        </div>

        <div id="notice" class="notice"></div>

        <div class="stats">
          <div class="stat"><span id="statNamespaces" class="stat-value">0</span><span class="stat-label">Namespaces</span></div>
          <div class="stat"><span id="statPods" class="stat-value">0</span><span class="stat-label">Pods</span></div>
          <div class="stat"><span id="statNodes" class="stat-value">0</span><span class="stat-label">Nodes</span></div>
          <div class="stat"><span id="statDeployments" class="stat-value">0</span><span class="stat-label">Deployments</span></div>
          <div class="stat"><span id="statServices" class="stat-value">0</span><span class="stat-label">Services</span></div>
          <div class="stat"><span id="statIngresses" class="stat-value">0</span><span class="stat-label">Ingresses</span></div>
        </div>

        <div class="toolbar">
          <input id="filterInput" class="search" type="search" placeholder="Filter resources" />
        </div>

        <div id="credentialPanel" class="credential-panel hidden">
          <form id="githubForm" class="hidden">
            <div class="form-grid">
              <input name="name" placeholder="Credential name, optional" />
              <input name="org" placeholder="GitHub org or user" />
              <input name="gitops_repo" class="wide" placeholder="GitOps repo, optional, e.g. zeturn/gitops" />
              <input name="token" class="wide" type="password" placeholder="GitHub token" required />
            </div>
            <div class="form-actions">
              <button class="button primary" type="submit">Add GitHub key</button>
            </div>
          </form>

          <form id="githubAppForm" class="hidden">
            <div class="form-grid">
              <input name="gitops_repo" class="wide" placeholder="GitOps repo, optional, e.g. zeturn/gitops" />
            </div>
            <div class="form-actions">
              <button class="button primary" type="submit">Connect GitHub App</button>
            </div>
          </form>

          <form id="cloudflareForm" class="hidden">
            <div class="form-grid">
              <input name="name" placeholder="Credential name" required />
              <input name="domain" placeholder="Domain, e.g. hollowdata.com" required />
              <input name="zone_id" class="wide" placeholder="Cloudflare zone ID" required />
              <input name="account_id" placeholder="Account ID" />
              <input name="api_token" class="wide" type="password" placeholder="Cloudflare API token" required />
            </div>
            <div class="form-actions">
              <button class="button primary" type="submit">Add Cloudflare key</button>
            </div>
          </form>
        </div>

        <div class="table-wrap">
          <table>
            <thead id="resourceHead"></thead>
            <tbody id="resourceRows"></tbody>
          </table>
        </div>
      </main>
    </section>

    <script>
      const state = {
        config: null,
        view: "namespaces",
        credentials: {
          github_credentials: [],
          cloudflare_credentials: [],
        },
        runtime: emptyRuntime(),
        token: localStorage.getItem("beancs.accessToken") || "",
      };

      const login = document.getElementById("login");
      const app = document.getElementById("app");
      const loginButton = document.getElementById("loginButton");
      const logoutButton = document.getElementById("logoutButton");
      const refreshButton = document.getElementById("refreshButton");
      const filterInput = document.getElementById("filterInput");
      const resourceHead = document.getElementById("resourceHead");
      const resourceRows = document.getElementById("resourceRows");
      const credentialPanel = document.getElementById("credentialPanel");
      const githubForm = document.getElementById("githubForm");
      const githubAppForm = document.getElementById("githubAppForm");
      const cloudflareForm = document.getElementById("cloudflareForm");
      const viewTitle = document.getElementById("viewTitle");
      const summary = document.getElementById("summary");
      const notice = document.getElementById("notice");
      const statNamespaces = document.getElementById("statNamespaces");
      const statPods = document.getElementById("statPods");
      const statNodes = document.getElementById("statNodes");
      const statDeployments = document.getElementById("statDeployments");
      const statServices = document.getElementById("statServices");
      const statIngresses = document.getElementById("statIngresses");

      loginButton.addEventListener("click", startLogin);
      logoutButton.addEventListener("click", logout);
      refreshButton.addEventListener("click", loadCurrentView);
      filterInput.addEventListener("input", renderCurrentView);
      githubForm.addEventListener("submit", (event) => createCredential(event, "github"));
      githubAppForm.addEventListener("submit", startGitHubAppInstall);
      cloudflareForm.addEventListener("submit", (event) => createCredential(event, "cloudflare"));
      resourceRows.addEventListener("click", handleTableAction);
      document.querySelectorAll(".nav-item[data-resource]").forEach((button) => {
        button.addEventListener("click", () => {
          state.view = button.dataset.resource;
          filterInput.value = "";
          loadCurrentView();
        });
      });

      const resourceMeta = {
        namespaces: {
          title: "Namespaces",
          label: "namespace",
          columns: ["Name", "Status", "Age", "Created", "Labels"],
          search: (ns) => `${ns.name || ""} ${ns.status || ""} ${labelText(ns.labels)}`.toLowerCase(),
          row: (ns) => {
            const labels = labelText(ns.labels);
            return `
              <tr>
                <td class="name">${escapeHTML(ns.name)}</td>
                <td>${statusPill(ns.status, ns.status === "Active")}</td>
                <td>${formatAge(ns.age_seconds)}</td>
                <td>${formatDate(ns.created_at)}</td>
                <td class="labels" title="${escapeHTML(labels)}">${escapeHTML(labels || "-")}</td>
              </tr>
            `;
          },
        },
        pods: {
          title: "Pods",
          label: "pod",
          columns: ["Namespace", "Name", "Status", "Ready", "Restarts", "Node", "Pod IP", "Age"],
          search: (pod) => `${pod.namespace || ""} ${pod.name || ""} ${pod.status || ""} ${pod.node_name || ""} ${pod.pod_ip || ""}`.toLowerCase(),
          row: (pod) => `
            <tr>
              <td>${escapeHTML(pod.namespace)}</td>
              <td class="name">${escapeHTML(pod.name)}</td>
              <td>${statusPill(pod.status, pod.status === "Running" || pod.status === "Succeeded")}</td>
              <td>${Number(pod.ready_containers || 0)}/${Number(pod.total_containers || 0)}</td>
              <td>${Number(pod.restarts || 0)}</td>
              <td>${escapeHTML(pod.node_name || "-")}</td>
              <td>${escapeHTML(pod.pod_ip || "-")}</td>
              <td>${formatAge(pod.age_seconds)}</td>
            </tr>
          `,
        },
        nodes: {
          title: "Nodes",
          label: "node",
          columns: ["Name", "Status", "Roles", "Version", "Internal IP", "Age", "Labels"],
          search: (node) => `${node.name || ""} ${node.status || ""} ${(node.roles || []).join(" ")} ${node.version || ""} ${node.internal_ip || ""} ${labelText(node.labels)}`.toLowerCase(),
          row: (node) => {
            const labels = labelText(node.labels);
            return `
              <tr>
                <td class="name">${escapeHTML(node.name)}</td>
                <td>${statusPill(node.status, node.status === "Ready")}</td>
                <td>${escapeHTML((node.roles || []).join(", ") || "-")}</td>
                <td>${escapeHTML(node.version || "-")}</td>
                <td>${escapeHTML(node.internal_ip || "-")}</td>
                <td>${formatAge(node.age_seconds)}</td>
                <td class="labels" title="${escapeHTML(labels)}">${escapeHTML(labels || "-")}</td>
              </tr>
            `;
          },
        },
        deployments: {
          title: "Deployments",
          label: "deployment",
          columns: ["Namespace", "Name", "Ready", "Available", "Updated", "Age"],
          search: (deploy) => `${deploy.namespace || ""} ${deploy.name || ""}`.toLowerCase(),
          row: (deploy) => `
            <tr>
              <td>${escapeHTML(deploy.namespace)}</td>
              <td class="name">${escapeHTML(deploy.name)}</td>
              <td>${Number(deploy.ready_replicas || 0)}/${Number(deploy.replicas || 0)}</td>
              <td>${Number(deploy.available_replicas || 0)}</td>
              <td>${Number(deploy.updated_replicas || 0)}</td>
              <td>${formatAge(deploy.age_seconds)}</td>
            </tr>
          `,
        },
        services: {
          title: "Services",
          label: "service",
          columns: ["Namespace", "Name", "Type", "Cluster IP", "External IP", "Ports", "Age"],
          search: (svc) => `${svc.namespace || ""} ${svc.name || ""} ${svc.type || ""} ${svc.cluster_ip || ""} ${svc.external_ip || ""} ${(svc.ports || []).join(" ")}`.toLowerCase(),
          row: (svc) => `
            <tr>
              <td>${escapeHTML(svc.namespace)}</td>
              <td class="name">${escapeHTML(svc.name)}</td>
              <td>${escapeHTML(svc.type || "-")}</td>
              <td>${escapeHTML(svc.cluster_ip || "-")}</td>
              <td>${escapeHTML(svc.external_ip || "-")}</td>
              <td class="labels" title="${escapeHTML((svc.ports || []).join(", "))}">${escapeHTML((svc.ports || []).join(", ") || "-")}</td>
              <td>${formatAge(svc.age_seconds)}</td>
            </tr>
          `,
        },
        ingresses: {
          title: "Ingresses",
          label: "ingress",
          columns: ["Namespace", "Name", "Class", "Hosts", "Address", "TLS", "Age"],
          search: (ing) => `${ing.namespace || ""} ${ing.name || ""} ${ing.class || ""} ${(ing.hosts || []).join(" ")} ${ing.address || ""}`.toLowerCase(),
          row: (ing) => `
            <tr>
              <td>${escapeHTML(ing.namespace)}</td>
              <td class="name">${escapeHTML(ing.name)}</td>
              <td>${escapeHTML(ing.class || "-")}</td>
              <td class="labels" title="${escapeHTML((ing.hosts || []).join(", "))}">${escapeHTML((ing.hosts || []).join(", ") || "-")}</td>
              <td>${escapeHTML(ing.address || "-")}</td>
              <td>${ing.tls ? "Yes" : "No"}</td>
              <td>${formatAge(ing.age_seconds)}</td>
            </tr>
          `,
        },
        github_credentials: {
          title: "GitHub Keys",
          label: "GitHub key",
          columns: ["Name", "Type", "Account", "GitOps repo", "Installation", "Active", "Created", "Actions"],
          search: (cred) => `${cred.name || ""} ${cred.auth_type || ""} ${cred.account_login || ""} ${cred.org || ""} ${cred.gitops_repo || ""} ${cred.installation_id || ""}`.toLowerCase(),
          row: (cred) => `
            <tr>
              <td class="name">${escapeHTML(cred.name)}</td>
              <td>${escapeHTML((cred.auth_type || "pat").toUpperCase())}</td>
              <td>${escapeHTML(cred.account_login || cred.org || "-")}</td>
              <td>${escapeHTML(cred.gitops_repo || "-")}</td>
              <td>${escapeHTML(cred.installation_id || "-")}</td>
              <td>${statusPill(cred.is_active ? "Active" : "Inactive", Boolean(cred.is_active))}</td>
              <td>${formatDate(cred.created_at)}</td>
              <td>
                <button class="button" type="button" data-action="repos" data-kind="github" data-id="${Number(cred.id)}">Repos</button>
                <button class="button" type="button" data-action="verify" data-kind="github" data-id="${Number(cred.id)}">Verify</button>
                <button class="button" type="button" data-action="delete" data-kind="github" data-id="${Number(cred.id)}">Delete</button>
              </td>
            </tr>
          `,
        },
        cloudflare_credentials: {
          title: "Cloudflare Keys",
          label: "Cloudflare key",
          columns: ["Name", "Domain", "Zone ID", "Account", "Active", "Created", "Actions"],
          search: (cred) => `${cred.name || ""} ${cred.domain || ""} ${cred.zone_id || ""} ${cred.account_id || ""}`.toLowerCase(),
          row: (cred) => `
            <tr>
              <td class="name">${escapeHTML(cred.name)}</td>
              <td>${escapeHTML(cred.domain || "-")}</td>
              <td>${escapeHTML(cred.zone_id || "-")}</td>
              <td>${escapeHTML(cred.account_id || "-")}</td>
              <td>${statusPill(cred.is_active ? "Active" : "Inactive", Boolean(cred.is_active))}</td>
              <td>${formatDate(cred.created_at)}</td>
              <td>
                <button class="button" type="button" data-action="verify" data-kind="cloudflare" data-id="${Number(cred.id)}">Verify</button>
                <button class="button" type="button" data-action="delete" data-kind="cloudflare" data-id="${Number(cred.id)}">Delete</button>
              </td>
            </tr>
          `,
        },
      };

      boot();

      async function boot() {
        try {
          state.config = await getJSON("/api/v1/ui/config");
          if (location.search.includes("code=")) {
            await finishLogin();
            history.replaceState({}, "", location.pathname);
          }
          if (location.search.includes("github_app=connected")) {
            state.view = "github_credentials";
            history.replaceState({}, "", location.pathname);
            showInfo("GitHub App connected.");
          }
          setView(Boolean(state.token));
          if (state.token) {
            await loadCurrentView();
          }
        } catch (err) {
          showError(err.message);
          setView(Boolean(state.token));
        }
      }

      function setView(authenticated) {
        login.classList.toggle("hidden", authenticated);
        app.classList.toggle("hidden", !authenticated);
      }

      async function startLogin() {
        const verifier = randomString(64);
        const challenge = await codeChallenge(verifier);
        const authState = randomString(32);
        sessionStorage.setItem("beancs.pkceVerifier", verifier);
        sessionStorage.setItem("beancs.oauthState", authState);

        const params = new URLSearchParams({
          response_type: "code",
          client_id: state.config.client_id,
          redirect_uri: browserRedirectURI(),
          scope: "openid profile email",
          state: authState,
          code_challenge: challenge,
          code_challenge_method: "S256",
        });
        location.href = trimSlash(state.config.auth_url) + "/oauth/authorize?" + params.toString();
      }

      async function finishLogin() {
        const params = new URLSearchParams(location.search);
        const oauthError = params.get("error");
        if (oauthError) {
          const description = params.get("error_description") || oauthError;
          sessionStorage.removeItem("beancs.pkceVerifier");
          sessionStorage.removeItem("beancs.oauthState");
          throw new Error(`BasaltPass login failed: ${description}`);
        }
        const code = params.get("code");
        const returnedState = params.get("state");
        const expectedState = sessionStorage.getItem("beancs.oauthState");
        const verifier = sessionStorage.getItem("beancs.pkceVerifier");
        if (!code || !verifier || returnedState !== expectedState) {
          throw new Error("Login callback was incomplete.");
        }

        const res = await fetch("/api/v1/ui/oauth/token", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
          code,
          redirect_uri: browserRedirectURI(),
          code_verifier: verifier,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.access_token) {
          throw new Error(data.error_description || data.error || "Unable to exchange login code.");
        }
        state.token = data.access_token;
        localStorage.setItem("beancs.accessToken", state.token);
        sessionStorage.removeItem("beancs.pkceVerifier");
        sessionStorage.removeItem("beancs.oauthState");
      }

      async function loadRuntime() {
        refreshButton.disabled = true;
        clearNotice();
        try {
          const data = await apiJSON("/api/v1/runtime/overview");
          state.runtime = normalizeRuntime(data.data);
          renderCurrentView();
        } catch (err) {
          if (err.status === 401) {
            logout();
            return;
          }
          showError(err.message);
        } finally {
          refreshButton.disabled = false;
        }
      }

      async function loadCredentials(kind) {
        refreshButton.disabled = true;
        clearNotice();
        try {
          const data = await apiJSON(`/api/v1/credentials/${kind}/`);
          state.credentials[`${kind}_credentials`] = data.data || [];
          renderCurrentView();
        } catch (err) {
          if (err.status === 401) {
            logout();
            return;
          }
          showError(err.message);
        } finally {
          refreshButton.disabled = false;
        }
      }

      async function loadCurrentView() {
        if (state.view === "github_credentials") {
          await loadCredentials("github");
          return;
        }
        if (state.view === "cloudflare_credentials") {
          await loadCredentials("cloudflare");
          return;
        }
        await loadRuntime();
      }

      function renderCurrentView() {
        const meta = resourceMeta[state.view] || resourceMeta.namespaces;
        const query = filterInput.value.trim().toLowerCase();
        const allRows = viewRows(state.view);
        const rows = allRows.filter((item) => !query || meta.search(item).includes(query));
        viewTitle.textContent = meta.title;
        filterInput.placeholder = `Filter ${meta.title.toLowerCase()}`;
        summary.textContent = `${rows.length} of ${allRows.length} ${meta.label}${allRows.length === 1 ? "" : "s"}`;
        document.querySelectorAll(".nav-item[data-resource]").forEach((button) => {
          button.classList.toggle("active", button.dataset.resource === state.view);
        });
        updateStats();
        renderCredentialPanel();
        resourceHead.innerHTML = `<tr>${meta.columns.map((column) => `<th>${escapeHTML(column)}</th>`).join("")}</tr>`;
        resourceRows.innerHTML = rows.length
          ? rows.map(meta.row).join("")
          : `<tr><td class="empty" colspan="${meta.columns.length}">No ${meta.label}s found</td></tr>`;
      }

      function logout() {
        state.token = "";
        state.runtime = emptyRuntime();
        localStorage.removeItem("beancs.accessToken");
        setView(false);
      }

      function viewRows(view) {
        if (view === "github_credentials" || view === "cloudflare_credentials") {
          return state.credentials[view] || [];
        }
        return state.runtime[view] || [];
      }

      function renderCredentialPanel() {
        const isGitHub = state.view === "github_credentials";
        const isCloudflare = state.view === "cloudflare_credentials";
        credentialPanel.classList.toggle("hidden", !isGitHub && !isCloudflare);
        githubForm.classList.toggle("hidden", !isGitHub);
        githubAppForm.classList.toggle("hidden", !isGitHub);
        cloudflareForm.classList.toggle("hidden", !isCloudflare);
      }

      async function createCredential(event, kind) {
        event.preventDefault();
        clearNotice();
        const form = event.currentTarget;
        const body = Object.fromEntries(new FormData(form).entries());
        Object.keys(body).forEach((key) => {
          if (typeof body[key] === "string") body[key] = body[key].trim();
          if (body[key] === "") delete body[key];
        });
        try {
          await apiJSON(`/api/v1/credentials/${kind}/`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body),
          });
          form.reset();
          await loadCredentials(kind);
        } catch (err) {
          showError(err.message);
        }
      }

      async function startGitHubAppInstall(event) {
        event.preventDefault();
        clearNotice();
        const body = Object.fromEntries(new FormData(event.currentTarget).entries());
        Object.keys(body).forEach((key) => {
          if (typeof body[key] === "string") body[key] = body[key].trim();
          if (body[key] === "") delete body[key];
        });
        try {
          const data = await apiJSON("/api/v1/credentials/github/app/start", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body),
          });
          location.href = data.install_url;
        } catch (err) {
          showError(err.message);
        }
      }

      async function handleTableAction(event) {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const kind = button.dataset.kind;
        const id = button.dataset.id;
        clearNotice();
        try {
          if (button.dataset.action === "verify") {
            await apiJSON(`/api/v1/credentials/${kind}/${id}/verify`);
            showInfo(`${kindLabel(kind)} credential verified.`);
          } else if (button.dataset.action === "repos") {
            const data = await apiJSON(`/api/v1/credentials/github/${id}/repositories`);
            const repos = data.data || [];
            const names = repos.slice(0, 20).map((repo) => repo.full_name).join(", ");
            showInfo(repos.length ? `${repos.length} repositories: ${names}${repos.length > 20 ? ", ..." : ""}` : "No repositories found.");
          } else if (button.dataset.action === "delete") {
            if (!confirm(`Delete this ${kindLabel(kind)} credential?`)) return;
            await apiJSON(`/api/v1/credentials/${kind}/${id}`, {method: "DELETE"});
            await loadCredentials(kind);
          }
        } catch (err) {
          showError(err.message);
        }
      }

      function emptyRuntime() {
        return {
          namespaces: [],
          pods: [],
          nodes: [],
          deployments: [],
          services: [],
          ingresses: [],
        };
      }

      function kindLabel(kind) {
        return kind === "cloudflare" ? "Cloudflare" : "GitHub";
      }

      function normalizeRuntime(data) {
        const runtime = emptyRuntime();
        Object.keys(runtime).forEach((key) => {
          runtime[key] = Array.isArray(data?.[key]) ? data[key] : [];
        });
        return runtime;
      }

      function updateStats() {
        statNamespaces.textContent = state.runtime.namespaces.length;
        statPods.textContent = state.runtime.pods.length;
        statNodes.textContent = state.runtime.nodes.length;
        statDeployments.textContent = state.runtime.deployments.length;
        statServices.textContent = state.runtime.services.length;
        statIngresses.textContent = state.runtime.ingresses.length;
      }

      function statusPill(value, ok) {
        return `<span class="pill ${ok ? "" : "warn"}">${escapeHTML(value || "Unknown")}</span>`;
      }

      function labelText(labels) {
        return Object.entries(labels || {}).map(([key, value]) => `${key}=${value}`).join(", ");
      }

      async function getJSON(url) {
        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || `Request failed with ${res.status}`);
        }
        return data;
      }

      async function apiJSON(url, options = {}) {
        const headers = Object.assign({}, options.headers || {}, {Authorization: `Bearer ${state.token}`});
        const res = await fetch(url, Object.assign({}, options, {headers}));
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const err = new Error(data.error || `Request failed with ${res.status}`);
          err.status = res.status;
          throw err;
        }
        return data;
      }

      async function codeChallenge(verifier) {
        const data = new TextEncoder().encode(verifier);
        const digest = await crypto.subtle.digest("SHA-256", data);
        return base64URL(new Uint8Array(digest));
      }

      function randomString(length) {
        const bytes = new Uint8Array(length);
        crypto.getRandomValues(bytes);
        return base64URL(bytes).slice(0, length);
      }

      function base64URL(bytes) {
        let binary = "";
        bytes.forEach((b) => binary += String.fromCharCode(b));
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function showError(message) {
        notice.textContent = message;
        notice.className = "notice error show";
      }

      function showInfo(message) {
        notice.textContent = message;
        notice.className = "notice show";
      }

      function clearNotice() {
        notice.textContent = "";
        notice.className = "notice";
      }

      function formatAge(seconds) {
        if (!Number.isFinite(seconds) || seconds < 0) return "-";
        const units = [["y", 31536000], ["d", 86400], ["h", 3600], ["m", 60]];
        for (const [label, size] of units) {
          if (seconds >= size) return `${Math.floor(seconds / size)}${label}`;
        }
        return `${Math.floor(seconds)}s`;
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Date(value).toLocaleString();
      }

      function trimSlash(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function browserRedirectURI() {
        return location.origin + "/api/v1/ui/oauth/callback";
      }

      function escapeHTML(value) {
        return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[ch]);
      }
    </script>
  </body>
</html>
