apiVersion: v1
kind: Secret
metadata:
  name: beancs-controller-env
  namespace: beancs-system
type: Opaque
stringData:
  DATABASE_URL: postgres://beancs:change-me-before-production@beancs-postgres.beancs-system.svc.cluster.local:5432/beancs?sslmode=disable
  BP_MGMT_BASE_URL: https://your-basaltpass.example.com
  BP_MGMT_CLIENT_ID: replace-me
  BP_MGMT_CLIENT_SECRET: replace-me
  # Root host or /api/v1 base; BeanCS normalizes browser OAuth calls to /api/v1/oauth/*.
  BP_BROWSER_AUTH_URL: https://your-basaltpass.example.com
  BP_BROWSER_CLIENT_ID: replace-me
  BP_BROWSER_CLIENT_SECRET: replace-me
  WEBHOOK_SECRET: replace-me
  ENCRYPTION_KEY: replace-with-64-hex-characters
  INGRESS_IP: 127.0.0.1
  BEANCS_PUBLIC_INGRESS_NAMESPACES: kube-system,traefik
  BEANCS_PRIVATE_INGRESS_NAMESPACES: tailscale,tailscale-system
  BEANCS_CERT_MANAGER_ISSUER_NAME: beancs-letsencrypt
  BEANCS_CERT_MANAGER_ACME_SERVER: https://acme-v02.api.letsencrypt.org/directory
  BEANCS_CERT_MANAGER_EMAIL: admin@example.com
  BEANCS_CERT_MANAGER_CLOUDFLARE_SECRET_NAME: beancs-cloudflare-dns01
  BEANCS_CERT_MANAGER_CLOUDFLARE_SECRET_KEY: api-token
  BEANCS_CERT_MANAGER_PRIVATE_KEY_SECRET_SUFFIX: account-key
  BEANCS_PUBLIC_HOST: beancs.example.com
  BEANCS_WEBHOOK_HOST: hooks.beancs.example.com
  BEANCS_TAILSCALE_HOST: beancs-controller
  BEANCS_GITHUB_APP_ID: "123456"
  BEANCS_GITHUB_APP_SLUG: beancs
  # PEM with escaped newlines or base64-encoded PEM.
  BEANCS_GITHUB_APP_PRIVATE_KEY: replace-me
