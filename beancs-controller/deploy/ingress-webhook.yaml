apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: beancs-webhooks-public
  namespace: beancs-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`hooks.beancs.hollodata.com`) && PathPrefix(`/api/v1/webhooks`)"
      kind: Rule
      services:
        - name: beancs-controller
          port: 8080
      middlewares:
        - name: webhook-ratelimit
        - name: webhook-headers
  tls:
    secretName: hooks-beancs-hollodata-com-tls
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: webhook-ratelimit
  namespace: beancs-system
spec:
  rateLimit:
    average: 30
    burst: 50
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: webhook-headers
  namespace: beancs-system
spec:
  headers:
    customResponseHeaders:
      X-Robots-Tag: "noindex, nofollow"
