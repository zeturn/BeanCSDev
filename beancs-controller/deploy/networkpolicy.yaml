apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: beancs-controller-ingress
  namespace: beancs-system
spec:
  podSelector:
    matchLabels:
      app: beancs-controller
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
      ports:
        - protocol: TCP
          port: 8080
