apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beancs-controller-tailscale
  namespace: beancs-system
spec:
  ingressClassName: tailscale
  rules:
    - host: beancs-controller
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beancs-controller
                port:
                  number: 8080
