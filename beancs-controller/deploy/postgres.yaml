apiVersion: v1
kind: Service
metadata:
  name: beancs-postgres
  namespace: beancs-system
  labels:
    app: beancs-postgres
    managed-by: beancs
spec:
  type: ClusterIP
  selector:
    app: beancs-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: beancs-postgres
  namespace: beancs-system
  labels:
    app: beancs-postgres
    managed-by: beancs
spec:
  serviceName: beancs-postgres
  replicas: 1
  selector:
    matchLabels:
      app: beancs-postgres
  template:
    metadata:
      labels:
        app: beancs-postgres
        managed-by: beancs
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - vps-9f2d58ef
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: beancs-postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - beancs
                - -d
                - beancs
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - beancs
                - -d
                - beancs
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
